name: Publish Qml4Net

on:
  push:
    tags:
      - "Qml4Net-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, e.g. 0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-qml4net
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Qml4Net
    runs-on: ubuntu-latest
    environment: nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#Qml4Net-v}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: ${version}" >&2
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build and test release candidate
        run: docker buildx build --target test -t qml4net:test .

      - name: Pack Qml4Net artifacts
        run: |
          rm -rf ./artifacts
          docker buildx build \
            --target artifacts \
            --build-arg PACK_TARGET=src/Qml4Net/Qml4Net.csproj \
            --build-arg PACKAGE_VERSION=${{ steps.version.outputs.value }} \
            -o type=local,dest=./artifacts .

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Qml4Net-${{ steps.version.outputs.value }}
          path: artifacts
          if-no-files-found: error

      - name: Publish Qml4Net to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          test -n "${NUGET_API_KEY}"
          docker buildx build \
            --target push \
            --secret id=nuget_api_key,env=NUGET_API_KEY \
            --build-arg PACK_TARGET=src/Qml4Net/Qml4Net.csproj \
            --build-arg PACKAGE_VERSION=${{ steps.version.outputs.value }} .
